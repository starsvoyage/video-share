<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('VideoShare | ' + ${video.title}, ~{::content}, true)}">

<th:block th:fragment="content">
    <div class="container py-4">

        <div class="row g-4">
            <!-- Main Video Area -->
            <div class="col-lg-8">
                <!-- Video Player Placeholder -->
                <div class="bg-dark text-white d-flex align-items-center justify-content-center rounded-4 shadow-sm"
                     style="height: 420px;">
                    <div class="text-center">
                        <div class="fs-1 mb-2">
                            <i class="bi bi-play-btn"></i>
                        </div>
                        <div class="fw-semibold">Video Player Placeholder</div>
                    </div>
                </div>

                <!-- Video Details -->
                <div class="mt-4">
                    <h1 class="h3 fw-bold mb-3" th:text="${video.title}">Video Title</h1>

                    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 border-bottom pb-3 mb-4">
                        <div>
                            <div class="fw-semibold">
                                <a th:href="@{/{username}/channel/{channelName}(username=${video.channel.user.username}, channelName=${video.channel.name})}"
                                   class="text-decoration-none text-dark"
                                   th:text="${video.channel.name}">
                                    Channel Name
                                </a>
                            </div>

                            <div class="text-muted small">
                                by <span th:text="${video.owner != null ? video.owner.displayName : video.channel.user.displayName}">Creator Name</span>
                            </div>
                        </div>

                        <div class="text-muted small">
                            <span th:if="${video.createdAt != null}"
                                  th:text="'Uploaded ' + ${#temporals.format(video.createdAt, 'MMM d, yyyy')}">
                                Uploaded date
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Comments Section -->
                <div class="mt-4">
                    <h5 class="mb-3">Comments</h5>

                    <div th:if="${loggedInUserId != null}">
                        <textarea
                                id="commentInput"
                                class="form-control"
                                rows="3"
                                placeholder="Add a comment..."></textarea>

                        <button
                                id="submitComment"
                                class="btn btn-dark mt-2">
                            Post Comment
                        </button>

                        <div id="commentMessage" class="mt-2 small"></div>
                    </div>

                    <div th:if="${loggedInUserId == null}" class="text-muted">
                        Please log in to comment.
                    </div>
                </div>
            </div>

            <!-- Side Panel -->
            <div class="col-lg-4">
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">Video Details</h5>

                        <div class="mb-3">
                            <div class="text-muted small">Title</div>
                            <div class="fw-semibold" th:text="${video.title}">Video Title</div>
                        </div>

                        <div class="mb-3">
                            <div class="text-muted small">Channel</div>
                            <div>
                                <a th:href="@{/{username}/channel/{channelName}(username=${video.channel.user.username}, channelName=${video.channel.name})}"
                                   class="text-decoration-none"
                                   th:text="${video.channel.name}">
                                    Channel Name
                                </a>
                            </div>
                        </div>

                        <div class="mb-3">
                            <div class="text-muted small">Creator</div>
                            <div th:text="${video.owner != null ? video.owner.displayName : video.channel.user.displayName}">
                                Creator Name
                            </div>
                        </div>

                        <div>
                            <div class="text-muted small">Created</div>
                            <div th:if="${video.createdAt != null}"
                                 th:text="${#temporals.format(video.createdAt, 'MMM d, yyyy h:mm a')}">
                                Date
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function () {
            const button = document.getElementById("submitComment");

            if (!button) return;

            button.addEventListener("click", async function () {
                const content = document.getElementById("commentInput").value.trim();
                const messageBox = document.getElementById("commentMessage");

                messageBox.textContent = "";
                messageBox.className = "mt-2 small";

                if (!content) {
                    messageBox.classList.add("text-danger");
                    messageBox.textContent = "Comment cannot be empty.";
                    return;
                }

                const videoId = /*[[${video.id}]]*/ 0;
                const userId = /*[[${loggedInUserId}]]*/ 0;

                try {
                    const response = await fetch(`/api/videos/${videoId}/comments`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({
                            userId: userId,
                            content: content,
                            parentId: null
                        })
                    });

                    if (!response.ok) {
                        throw new Error("Failed to post comment");
                    }

                    document.getElementById("commentInput").value = "";
                    messageBox.classList.add("text-success");
                    messageBox.textContent = "Comment posted successfully!";
                } catch (error) {
                    messageBox.classList.add("text-danger");
                    messageBox.textContent = "Could not post comment. Please try again.";
                    console.error(error);
                }
            });
        });
    </script>
</th:block>
</html>
