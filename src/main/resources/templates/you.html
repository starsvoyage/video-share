<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('VideoShare | ' + ${user.username}, ~{::content}, true)}">

<th:block th:fragment="content">
    <div class="px-4 py-4">

        <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${successMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${errorMessage}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Profile Header -->
        <div class="py-4 border-bottom">
            <div class="d-flex flex-column flex-md-row align-items-start align-items-md-center gap-4">

                <div class="flex-shrink-0">
                    <img th:if="${user.avatarUrl != null and !#strings.isEmpty(user.avatarUrl)}"
                         th:src="${user.avatarUrl}"
                         alt="User Avatar"
                         class="rounded-circle border you-avatar-lg">

                    <div th:if="${user.avatarUrl == null or #strings.isEmpty(user.avatarUrl)}"
                         class="you-letter-avatar-lg text-dark"
                         th:text="${#strings.substring(user.username,0,1).toUpperCase()}">
                    </div>
                </div>

                <div class="flex-grow-1">
                    <h1 class="h2 fw-bold mb-2" th:text="${user.displayName}">Display Name</h1>

                    <div class="text-muted mb-2">
                        @<span th:text="${user.username}">username</span>
                        <span class="mx-2">•</span>
                        <span th:text="${user.role}">VIEWER</span>
                    </div>

                    <div class="d-flex flex-wrap gap-2 mb-2">
                        <span class="badge rounded-pill px-3 py-2"
                              th:classappend="${isVerified} ? 'text-bg-success' : 'text-bg-warning'">
                            <span th:text="${isVerified} ? 'Verified Account' : 'Not Verified'">Status</span>
                        </span>
                    </div>

                    <p class="mb-0 text-secondary"
                       th:if="${user.bio != null and !#strings.isEmpty(user.bio)}"
                       th:text="${user.bio}">
                        Bio goes here
                    </p>
                </div>
            </div>
        </div>
        <!-- Channels Section -->
        <section class="you-section">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h3 class="h5 mb-0">Channels</h3>

                <button type="button" class="btn btn-outline-dark btn-sm you-view-all-btn">
                    View all
                </button>
            </div>

            <div class="row g-4">
                <!-- Create Channel Card -->
                <div class="col-12 col-md-6 col-lg-4" th:if="${canCreateChannel}">
                    <button type="button"
                            class="card h-100 w-100 border-0 bg-white shadow-sm rounded-4 p-4 text-center"
                            data-bs-toggle="modal"
                            data-bs-target="#createChannelModal"
                            style="min-height: 180px;">
                        <div class="d-flex flex-column justify-content-center align-items-center h-100">
                            <div class="rounded-circle border d-flex align-items-center justify-content-center mb-3"
                                 style="width: 64px; height: 64px; font-size: 2rem;">
                                +
                            </div>
                            <div class="fw-semibold">Create Channel</div>
                        </div>
                    </button>
                </div>

                <!-- Disabled Create Channel Card -->
                <div class="col-12 col-md-6 col-lg-4" th:if="${!canCreateChannel}">
                    <div class="card h-100 w-100 border-0 bg-light shadow-sm rounded-4 p-4 text-center text-muted"
                         style="min-height: 180px;">
                        <div class="d-flex flex-column justify-content-center align-items-center h-100">
                            <div class="rounded-circle border bg-white d-flex align-items-center justify-content-center mb-3"
                                 style="width: 64px; height: 64px; font-size: 2rem;">
                                +
                            </div>
                            <div class="fw-semibold">Verify to Create</div>
                        </div>
                    </div>
                </div>

                <!-- Existing Channels -->
                <div class="col-12 col-md-6 col-lg-4" th:each="channel : ${channels}">
                    <a th:href="@{/{username}/channel/{channelName}(username=${channel.user.username}, channelName=${channel.name})}"
                       class="text-decoration-none text-dark">
                        <div class="card h-100 border-0 bg-white shadow-sm rounded-4 p-4"
                             style="min-height: 180px;">
                            <div class="d-flex align-items-start gap-3">
                                <div th:if="${channel.avatarUrl != null and !#strings.isEmpty(channel.avatarUrl)}">
                                    <img th:src="${channel.avatarUrl}"
                                         alt="Channel Avatar"
                                         class="rounded-circle border"
                                         style="width: 56px; height: 56px; object-fit: cover;">
                                </div>

                                <div th:if="${channel.avatarUrl == null or #strings.isEmpty(channel.avatarUrl)}"
                                     class="rounded-circle border d-flex align-items-center justify-content-center fw-bold flex-shrink-0"
                                     style="width: 56px; height: 56px; font-size: 1.5rem;"
                                     th:text="${#strings.substring(channel.name,0,1).toUpperCase()}">
                                </div>

                                <div class="flex-grow-1">
                                    <div class="fw-semibold fs-5" th:text="${channel.name}">Channel Name</div>
                                    <div class="text-muted small mb-3">
                                        <span th:text="${channel.subscriberCount}">0</span> subscribers
                                    </div>
                                    <div class="text-muted"
                                         th:text="${channel.description != null and !#strings.isEmpty(channel.description) ? channel.description : 'No description.'}">
                                        No description.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </a>
                </div>
            </div>
        </section>
        <!-- History Section -->
        <section class="you-section">
            <div class="d-flex justify-content-between align-items-center you-section-header">
                <div>
                    <h3 class="h5 mb-1">History</h3>
                </div>

                <button type="button" class="btn btn-outline-dark btn-sm you-view-all-btn">
                    View all
                </button>
            </div>

            <div class="row g-4">
                <div class="col-12" th:if="${history == null or #lists.isEmpty(history)}">
                    <p class="text-muted mb-0">No history yet.</p>
                </div>
            </div>
        </section>

        <!-- Playlists Section -->
        <section class="you-section">
            <div class="d-flex justify-content-between align-items-center you-section-header">
                <div>
                    <h3 class="h5 mb-1">Playlists</h3>
                </div>

                <button type="button" class="btn btn-outline-dark btn-sm you-view-all-btn">
                    View all
                </button>
            </div>

            <div class="row g-4">
                <div class="col-12" th:if="${playlists == null or #lists.isEmpty(playlists)}">
                    <p class="text-muted mb-0">No playlists yet.</p>
                </div>
            </div>
        </section>

        <!-- Liked Videos -->
        <section class="you-section">
            <div class="d-flex justify-content-between align-items-center you-section-header">
                <div>
                    <h3 class="h5 mb-1">Liked Videos</h3>
                </div>

                <button type="button" class="btn btn-outline-dark btn-sm you-view-all-btn">
                    View all
                </button>
            </div>
            <div class="text-muted">
                No liked videos yet.
            </div>
        </section>

    </div>

    <!-- Create Channel Modal -->
    <div class="modal fade" id="createChannelModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg">

                <form th:action="@{/channels/create}" method="post" enctype="multipart/form-data">

                    <div class="modal-header border-0 pb-0">
                        <h5 class="modal-title fw-semibold">Create Channel</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>

                    <div class="modal-body pt-2">

                        <div class="mb-3">
                            <label class="form-label small text-muted">Channel Name</label>
                            <input type="text"
                                   name="name"
                                   maxlength="100"
                                   required
                                   class="form-control rounded-pill px-3"
                                   placeholder="My Channel Name"
                                   th:value="${channelNameValue}">
                        </div>

                        <div class="mb-3">
                            <label class="form-label small text-muted">Description</label>
                            <textarea name="description"
                                      maxlength="500"
                                      rows="3"
                                      class="form-control rounded-4 px-3"
                                      placeholder="Tell viewers what your channel is about"
                                      th:text="${channelDescriptionValue}"></textarea>
                        </div>

                        <div class="mb-2">
                            <label class="form-label small text-muted">Channel Avatar</label>
                            <input type="file"
                                   name="avatarUrl"
                                   accept="image/png,image/jpeg,image/jpg,image/webp"
                                   class="form-control rounded-4 px-3">
                        </div>

                    </div>

                    <div class="modal-footer border-0 pt-0">
                        <button type="button"
                                class="btn btn-outline-secondary rounded-pill px-4"
                                data-bs-dismiss="modal">
                            Cancel
                        </button>

                        <button type="submit"
                                class="btn btn-dark rounded-pill px-4">
                            Create Channel
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>

    <script th:if="${openCreateChannelModal}">
        document.addEventListener("DOMContentLoaded", function () {
            const modalElement = document.getElementById("createChannelModal");
            if (modalElement) {
                const modal = new bootstrap.Modal(modalElement);
                modal.show();
            }
        });
    </script>
</th:block>
</html>
