<!--
    navbar.html (View Layer - Thymeleaf Fragment)

    Defines the navigation bar used across the application.
    Displays different options depending on whether the user is logged in.

    This fragment is included in other pages through the base layout.
-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar"
     style="border-bottom:1px solid #2f2f2f;">

    <div class="container-fluid d-flex align-items-center px-3">

        <!-- Sidebar toggle -->
        <button id="sidebarToggle"
                type="button"
                class="sidebar-toggle-btn me-2"
                aria-label="Toggle sidebar">
            <span id="sidebarToggleIcon">☰</span>
        </button>

        <!-- Project logo-->
        <a class="navbar-brand d-flex align-items-center gap-2" th:href="@{/}">
            <img th:src="@{/images/vs-title-logo.svg}"
                 alt="VideoShare"
                 height="36">
        </a>

        <!-- Search bar -->
        <div class="flex-grow-1 d-flex justify-content-center">
            <form class="d-flex" role="search" th:action="@{/#}" method="get" style="width:100%; max-width:500px;">
                <div class="input-group">

                    <input class="form-control bg-dark text-white border-secondary"
                           type="search"
                           name="q"
                           placeholder="Search"
                           aria-label="Search">

                    <button class="btn btn-outline-light" type="submit">
                        <i class="bi bi-search"></i>
                    </button>

                </div>
            </form>
        </div>

        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- Navigation -->
            <a th:if="${session.loggedInUserId == null}"
               th:href="@{/login}"
               class="btn btn-outline-light btn-sm">Sign in</a>

            <a th:if="${session.loggedInUserId == null}"
               th:href="@{/register}"
               class="btn btn-light btn-sm">Sign up</a>

            <!-- Logged-in user actions -->
            <div th:if="${session.loggedInUserId != null}" class="d-flex align-items-center gap-3">

                <!-- Create dropdown -->
                <div class="dropdown">
                    <button class="btn btn-outline-light btn-sm d-flex align-items-center gap-1"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false">
                        <i class="bi bi-plus-lg"></i>
                        <span>Create</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item"
                               href="#"
                               data-bs-toggle="modal"
                               data-bs-target="#uploadVideoModal">
                               Upload video
                            </a>
                        </li>
                    </ul>
                </div>

                <!-- Notifications dropdown -->
                <div class="dropdown">
                    <button class="btn btn-dark border-0 position-relative d-flex align-items-center justify-content-center"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="width: 40px; height: 40px; box-shadow: none;">
                        <i class="bi bi-bell fs-5"></i>
                        <span th:if="${unreadNotificationCount != null and unreadNotificationCount > 0}"
                              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                              style="font-size: 0.65rem;"
                              th:text="${unreadNotificationCount}">0</span>
                    </button>

                    <ul class="dropdown-menu dropdown-menu-end p-0 bg-dark" style="min-width: 340px; max-height: 450px; overflow-y: auto;" id="notificationDropdown">
                    <li class="d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                        <span class="fw-semibold text-white">Notifications</span>
                    </li>
                    <li class="px-3 py-2 border-bottom" onclick="event.stopPropagation();">
                        <div class="d-flex gap-1 flex-wrap">
                            <button class="btn btn-sm btn-dark rounded-pill px-2 py-0 notif-filter active" data-filter="ALL" style="font-size:0.75rem;">All</button>
                            <button class="btn btn-sm btn-outline-light rounded-pill px-2 py-0 notif-filter" data-filter="COMMENT" style="font-size:0.75rem;">Comments</button>
                            <button class="btn btn-sm btn-outline-light rounded-pill px-2 py-0 notif-filter" data-filter="LIKE_VIDEO" style="font-size:0.75rem;">Likes</button>
                            <button class="btn btn-sm btn-outline-light rounded-pill px-2 py-0 notif-filter" data-filter="UPLOAD" style="font-size:0.75rem;">Uploads</button>
                            <button class="btn btn-sm btn-outline-light rounded-pill px-2 py-0 notif-filter" data-filter="REPLY" style="font-size:0.75rem;">Replies</button>
                            <button class="btn btn-sm btn-outline-light rounded-pill px-2 py-0 notif-filter" data-filter="SUBSCRIBE" style="font-size:0.75rem;">Subs</button>
                        </div>
                    </li>
                    <div id="notifList">
                        <li class="px-3 py-3 small text-center text-light" id="notifEmpty">Loading...</li>
                    </div>
                </ul>
                    <script th:inline="javascript">
                        document.addEventListener("DOMContentLoaded", function () {
                            const notifUserId = /*[[${session.loggedInUserId}]]*/ null;
                            if (!notifUserId) return;
                            const notifList = document.getElementById("notifList");
                            const badge = document.querySelector("#notificationDropdown").closest(".dropdown").querySelector(".badge");
                            let currentFilter = "ALL";
                            loadNotifications();
                            document.querySelectorAll(".notif-filter").forEach(btn => {
                                btn.addEventListener("click", function (e) {
                                    e.stopPropagation();
                                    e.preventDefault();
                                    document.querySelectorAll(".notif-filter").forEach(b => {
                                        b.classList.remove("btn-dark", "active");
                                        b.classList.add("btn-outline-light");
                                    });
                                    this.classList.remove("btn-outline-light");
                                    this.classList.add("btn-dark", "active");
                                    currentFilter = this.dataset.filter;
                                    loadNotifications();
                                });
                            });
                            async function loadNotifications() {
                                try {
                                    let url = `/api/notifications/user/${notifUserId}`;
                                    if (currentFilter !== "ALL") {
                                        url = `/api/notifications/user/${notifUserId}/filter?type=${currentFilter}`;
                                    }
                                    const res = await fetch(url);
                                    const notifs = res.ok ? await res.json() : [];
                                    notifList.innerHTML = "";
                                    if (notifs.length === 0) {
                                        notifList.innerHTML = '<li class="px-3 py-3 small text-center text-light">No notifications.</li>';
                                        return;
                                    }
                                    notifs.forEach(n => {
                                        const li = document.createElement("li");
                                        li.innerHTML = `<a class="dropdown-item px-3 py-2 small d-flex align-items-start gap-2 ${n.read ? '' : 'fw-semibold'}" href="#" data-notif-id="${n.id}" style="color:#fff;">
                                            <div class="flex-grow-1">
                                                <div>${escN(n.message)}</div>
                                                <div style="font-size:0.7rem; color:#aaa;">${fmtDate(n.createdAt)}</div>
                                            </div>
                                            ${!n.read ? '<span class="bg-primary rounded-circle flex-shrink-0 mt-1" style="width:8px;height:8px;display:inline-block;"></span>' : ''}
                                        </a>`;
                                        li.querySelector("a").addEventListener("click", function (e) {
                                            e.preventDefault();
                                            e.stopPropagation();
                                            if (!n.read) {
                                                fetch(`/api/notifications/${n.id}/read`, { method: 'PATCH' }).then(() => {
                                                    this.classList.remove("fw-semibold");
                                                    const dot = this.querySelector(".bg-primary");
                                                    if (dot) dot.remove();
                                                    updateBadge(-1);
                                                    n.read = true;
                                                });
                                            }
                                        });
                                        notifList.appendChild(li);
                                    });
                                } catch (e) {
                                    notifList.innerHTML = '<li class="px-3 py-3 small text-center text-light">No notifications.</li>';
                                }
                            }
                            function updateBadge(delta) {
                                if (!badge) return;
                                let count = parseInt(badge.textContent || "0") + delta;
                                if (count <= 0) { badge.style.display = "none"; }
                                else { badge.textContent = count; badge.style.display = ""; }
                            }
                            function escN(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
                            function fmtDate(iso) { if (!iso) return ""; return new Date(iso).toLocaleDateString("en-US", {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}); }
                        });
                    </script>
                </div>

                <!-- User dropdown -->
                <div class="dropdown">

                    <!-- Avatar button -->
                    <button class="btn btn-dark border-0 p-0 d-flex align-items-center"
                            type="button"
                            data-bs-toggle="dropdown"
                            aria-expanded="false"
                            style="box-shadow: none;">

                        <!-- User avatar image if available -->
                        <img th:if="${session.loggedInAvatarUrl != null and !#strings.isEmpty(session.loggedInAvatarUrl)}"
                             th:src="${session.loggedInAvatarUrl}"
                             alt="User avatar"
                             class="rounded-circle"
                             style="width: 36px; height: 36px; object-fit: cover;">

                        <!-- Fallback avatar using first letter of username -->
                        <div th:if="${session.loggedInAvatarUrl == null or #strings.isEmpty(session.loggedInAvatarUrl)}"
                             class="rounded-circle bg-light text-dark d-flex align-items-center justify-content-center fw-bold"
                             style="width: 36px; height: 36px;"
                             th:text="${#strings.substring(session.loggedInUsername, 0, 1).toUpperCase()}">
                        </div>
                    </button>

                    <!-- User menu -->
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" th:href="@{/you}">Account</a>
                        </li>


                        <li>
                            <a class="dropdown-item" th:href="@{/settings}">Settings</a>
                        </li>


                        <!-- Logout action -->
                        <li>
                            <form th:action="@{/logout}" method="post" class="m-0">
                                <button type="submit" class="dropdown-item">Sign out</button>
                            </form>
                        </li>
                    </ul>
                </div>

            </div>
        </div>
    </div>
</nav>
</body>
</html>
