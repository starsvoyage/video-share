<!--
    navbar.html (View Layer - Thymeleaf Fragment)

    Defines the navigation bar used across the application.
    Displays different options depending on whether the user is logged in.

    This fragment is included in other pages through the base layout.
-->
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar"
     style="border-bottom:1px solid #2f2f2f;">

    <div class="container-fluid d-flex align-items-center px-3">

        <!-- Sidebar toggle -->
        <button id="sidebarToggle"
                type="button"
                class="sidebar-toggle-btn me-2"
                aria-label="Toggle sidebar">
            <span id="sidebarToggleIcon">☰</span>
        </button>

        <!-- Application brand / home link -->
        <a class="navbar-brand" th:href="@{/}">VideoShare</a>

        <!-- Search bar -->
        <div class="flex-grow-1 d-flex justify-content-center">
            <form class="d-flex" role="search" th:action="@{/#}" method="get" style="width:100%; max-width:500px;">
                <div class="input-group">

                    <input class="form-control bg-dark text-white border-secondary"
                           type="search"
                           name="q"
                           placeholder="Search"
                           aria-label="Search">

                    <button class="btn btn-outline-light" type="submit">
                        <i class="bi bi-search"></i>
                    </button>

                </div>
            </form>
        </div>

        <div class="ms-auto d-flex align-items-center gap-2">

            <!-- Navigation -->
            <a th:if="${session.loggedInUserId == null}"
               th:href="@{/login}"
               class="btn btn-outline-light btn-sm">Sign in</a>

            <a th:if="${session.loggedInUserId == null}"
               th:href="@{/register}"
               class="btn btn-light btn-sm">Sign up</a>

            <!-- Logged-in user dropdown -->
            <div th:if="${session.loggedInUserId != null}" class="dropdown">

                <!-- Avatar button -->
                <button class="btn btn-dark border-0 p-0 dropdown-toggle d-flex align-items-center"
                        type="button"
                        data-bs-toggle="dropdown"
                        aria-expanded="false"
                        style="box-shadow: none;">

                    <!-- User avatar image if available -->
                    <img th:if="${session.loggedInAvatarUrl != null and !#strings.isEmpty(session.loggedInAvatarUrl)}"
                         th:src="${session.loggedInAvatarUrl}"
                         alt="User avatar"
                         class="rounded-circle"
                         style="width: 36px; height: 36px; object-fit: cover;">

                    <!-- Fallback avatar using first letter of username -->
                    <div th:if="${session.loggedInAvatarUrl == null or #strings.isEmpty(session.loggedInAvatarUrl)}"
                         class="rounded-circle bg-light text-dark d-flex align-items-center justify-content-center fw-bold"
                         style="width: 36px; height: 36px;"
                         th:text="${#strings.substring(session.loggedInUsername, 0, 1).toUpperCase()}">
                    </div>
                </button>

                <!-- Dropdown menu -->
                <ul class="dropdown-menu dropdown-menu-end">

                    <!-- Logout action -->
                    <li>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="dropdown-item">Sign out</button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</nav>
</body>
</html>
