<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('VideoShare | Forgot Password', ~{::content}, false, false)}">

<th:block th:fragment="content">
    <div class="login-page d-flex align-items-start justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                    <!-- Page title / branding -->
                    <div class="text-center mb-4">
                        <img th:src="@{/images/vs-logo.svg}"
                             alt="VideoShare"
                             height="64"
                             style="margin-bottom:16px;">
                        <h1 class="h2 fw-bold text-white">Forgot your password?</h1>
                        <p class="text-white-50 mb-1">Enter the email address associated with your account.</p>
                        <p class="text-white-50 mb-0">
                            We’ll send you a secure password reset link so you can recover access.
                        </p>
                    </div>

                    <!-- Forgot password form -->
                    <form th:action="@{/forgot-password}"
                          th:object="${forgotPasswordForm}"
                          method="post"
                          novalidate>

                        <!-- Success message -->
                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                        <!-- Global errors -->
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                        </div>

                        <!-- Email field -->
                        <div class="mb-3">
                            <label for="email" class="form-label text-white fw-semibold">Email address</label>
                            <input type="email"
                                   id="email"
                                   th:field="*{email}"
                                   class="form-control form-control-lg login-input"
                                   placeholder="Enter your email address">

                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('email')}"
                                 th:errors="*{email}"></div>
                        </div>

                        <!-- Submit button -->
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
                            Send reset link
                        </button>
                    </form>

                    <!-- Navigation -->
                    <div class="text-center mt-4">
                        <a th:href="@{/login}" class="text-decoration-none">Back to sign in</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</th:block>

</html>
