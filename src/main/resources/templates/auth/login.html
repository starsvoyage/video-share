<!--
    login.html (View Layer - Thymeleaf Template)

    Displays a form where users can enter their username/email
    and password to authenticate.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('VideoShare | Sign In', ~{::content}, false, false)}">

<th:block th:fragment="content">
    <div class="login-page d-flex align-items-start justify-content-center">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-11 col-sm-9 col-md-7 col-lg-5 col-xl-4">

                    <!-- Page title / branding -->
                    <div class="text-center mb-4">
                        <img th:src="@{/images/vs-logo.svg}"
                             alt="VideoShare"
                             height="64"
                             style="margin-bottom:16px;">
                        <h1 class="h2 fw-bold text-white">Sign in to VideoShare</h1>
                    </div>

                    <!-- Login form -->
                    <form th:action="@{/login}" th:object="${loginForm}" method="post" novalidate>

                        <!-- Success message -->
                        <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                        <!-- Global authentication errors -->
                        <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger">
                            <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                        </div>

                        <!-- Username or Email field -->
                        <div class="mb-3">
                            <label for="identifier" class="form-label text-white fw-semibold">Username or email address</label>
                            <input type="text"
                                   id="identifier"
                                   th:field="*{identifier}"
                                   class="form-control form-control-lg login-input"
                                   placeholder="Enter your username or email">

                            <!-- Field validation errors -->
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('identifier')}"
                                 th:errors="*{identifier}"></div>
                        </div>

                        <!-- Password field -->
                        <div class="mb-3">
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <label for="password" class="form-label text-white fw-semibold mb-0">Password</label>
                                <a th:href="@{/forgot-password}" class="small text-decoration-none">Forgot password?</a>
                            </div>

                            <input type="password"
                                   id="password"
                                   th:field="*{password}"
                                   class="form-control form-control-lg login-input"
                                   placeholder="Enter your password">

                            <!-- Field validation errors -->
                            <div class="text-danger small mt-1"
                                 th:if="${#fields.hasErrors('password')}"
                                 th:errors="*{password}"></div>
                        </div>

                        <!-- Submit button -->
                        <button type="submit" class="btn btn-success btn-lg w-100 fw-semibold">
                            Sign in
                        </button>
                    </form>

                    <!-- Link to registration page -->
                    <div class="text-center mt-4">
                        <span class="text-white-50">New to VideoShare?</span>
                        <a th:href="@{/register}" class="text-decoration-none">Create an account</a>
                    </div>

                </div>
            </div>
        </div>
    </div>
</th:block>

</html>
