<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>VideoShare Password Reset Successful</title>
</head>

<body style="margin:0;padding:0;background-color:#1f1f1f;font-family:Arial,Helvetica,sans-serif;">

<table role="presentation" style="width:100%;border:0;border-spacing:0;background-color:#1f1f1f;padding:40px 20px;">
    <tr>
        <td align="center">

            <table role="presentation"
                   style="width:100%;max-width:520px;border:0;border-spacing:0;background-color:#2a2a2a;
                          border-radius:16px;padding:40px 32px;text-align:center;">

                <tr>
                    <td align="center">

                        <div style="width:64px;height:64px;line-height:64px;border-radius:50%;
                                    background-color:#ffffff;color:#111111;font-weight:bold;
                                    font-size:24px;margin:0 auto 20px auto;text-align:center;">
                            VS
                        </div>

                        <h1 style="margin:0 0 16px 0;font-size:28px;line-height:1.3;color:#ffffff;font-weight:700;">
                            Your password was reset successfully
                        </h1>

                        <p style="margin:0 0 24px 0;font-size:16px;line-height:1.6;color:#d1d5db;">
                            Hi <strong th:text="${username}" style="color:#ffffff;">User</strong>,<br><br>
                            The password for your <strong style="color:#ffffff;">VideoShare</strong> account has been changed successfully.
                            You can now sign in with your new password.
                        </p>

                        <a href="http://localhost:8080/login"
                           style="display:inline-block;background-color:#198754;color:#ffffff;
                                  text-decoration:none;padding:14px 26px;border-radius:10px;
                                  font-size:16px;font-weight:700;margin-bottom:28px;">
                            Sign in to VideoShare
                        </a>

                        <p style="margin:0;font-size:12px;line-height:1.5;color:#6b7280;">
                            If you did not reset your password, please secure your account immediately and contact support.
                        </p>

                    </td>
                </tr>
            </table>

        </td>
    </tr>
</table>

</body>
</html>
