<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout/base :: layout('Browse Channels | VideoShare', ~{::content}, true, true)}">

<th:block th:fragment="content">
    <div class="container py-5">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0">Browse Channels</h2>
        </div>

        <!-- Search channels filter -->
        <form class="mb-4" th:action="@{/browse/channels}" method="get">
            <div class="input-group" style="max-width:400px;">
                <input class="form-control rounded-start-pill px-3"
                       type="search" name="q" placeholder="Search channels..."
                       th:value="${query}">
                <button class="btn btn-dark rounded-end-pill px-3" type="submit">
                    <i class="bi bi-search"></i>
                </button>
            </div>
        </form>

        <!-- Empty state -->
        <div th:if="${#lists.isEmpty(browseChannels)}" class="text-muted">
            No channels found.
        </div>

        <!-- Channel cards grid display-->
        <div th:if="${!#lists.isEmpty(browseChannels)}" class="row g-4">
            <div class="col-12 col-md-6 col-lg-4" th:each="channel : ${browseChannels}">
                <a th:href="@{'/' + ${channel.user.username} + '/channel/' + ${channel.name}}"
                   class="text-decoration-none text-dark">
                    <div class="card border-0 shadow-sm rounded-4 h-100">
                        <div class="card-body d-flex align-items-center gap-3">
                            <!-- Channel avatar img -->
                            <img th:if="${channel.avatarUrl != null and !#strings.isEmpty(channel.avatarUrl)}"
                                 th:src="${channel.avatarUrl}"
                                 alt="Avatar"
                                 class="rounded-circle"
                                 style="width:56px; height:56px; object-fit:cover;">
                            <!-- default avatar with first letter of channel name -->
                            <div th:if="${channel.avatarUrl == null or #strings.isEmpty(channel.avatarUrl)}"
                                 class="rounded-circle bg-dark text-white d-flex align-items-center justify-content-center fw-bold"
                                 style="width:56px; height:56px; font-size:20px;"
                                 th:text="${#strings.substring(channel.name,0,1).toUpperCase()}">
                            </div>
                            <div>
                                <div class="fw-semibold" th:text="${channel.name}">Channel Name</div>
                                <div class="text-muted small" th:text="${channel.user.displayName}">Owner</div>
                                <div class="text-muted small">
                                    <span th:text="${channel.subscriberCount}">0</span> subscribers
                                </div>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</th:block>
</html>
