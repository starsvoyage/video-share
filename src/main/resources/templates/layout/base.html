<!--
    base.html (View Layer - Thymeleaf Layout)

    Defines the main layout template for the application.
    Provides the common page structure including Bootstrap, shared CSS,
    and an optional navigation bar.

    Other pages insert their content into this layout using the
    'content' fragment parameter.
-->
<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, showNavbar)">

<head>
    <meta charset="UTF-8">
    <!-- Page title passed from child templates -->
    <title th:text="${pageTitle}">VideoShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Application styles -->
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</head>

<body>
    <!-- Optional navigation bar -->
    <th:block th:if="${showNavbar}">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </th:block>
    <!-- Page-specific content -->
    <th:block th:replace="${content}"></th:block>
    <!-- Bootstrap JavaScript bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
