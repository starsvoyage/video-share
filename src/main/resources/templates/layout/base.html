<!--
    base.html (View Layer - Thymeleaf Layout)

    Defines the main layout template for the application.
    Provides the common page structure including Bootstrap, shared CSS,
    and an optional navigation bar.

    Other pages insert their content into this layout using the
    'content' fragment parameter.
-->
<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, showNavbar, showSidebar)"

<head>
    <meta charset="UTF-8">
    <!-- Page title passed from child templates -->
    <title th:text="${pageTitle}">VideoShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Application styles -->
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/you.css}">
    <link rel="stylesheet" th:href="@{/css/settings.css}">

    <!-- Toast Notifications -->
    <style>
        .vs-toast-container {
            position: fixed;
            top: 80px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .vs-toast {
            pointer-events: auto;
            padding: 14px 22px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            animation: vsToastIn 0.3s ease-out;
            max-width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vs-toast-success { background: #198754; }
        .vs-toast-error   { background: #dc3545; }
        .vs-toast-info    { background: #0d6efd; }

        .vs-toast-close {
            background: none;
            border: none;
            color: rgba(255,255,255,0.7);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0;
            margin-left: auto;
        }

        .vs-toast-close:hover { color: #fff; }

        @keyframes vsToastIn {
            from { opacity: 0; transform: translateX(40px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        @keyframes vsToastOut {
            from { opacity: 1; }
            to   { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>

<body style="background-color: #f1f3f5;">
    <!-- Gloabl Toast Container -->
    <div id="vsToastContainer" class="vs-toast-container"></div>

    <!-- Navbar -->
    <th:block th:if="${showNavbar}">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </th:block>

    <!-- Page layout -->
    <div class="d-flex">

        <!-- Sidebar -->
        <th:block th:if="${showSidebar}">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </th:block>

        <!-- Page-specific content -->
        <main class="flex-grow-1">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>

<!-- Upload Video Modal -->
<div class="modal fade" id="uploadVideoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg">

            <form th:action="@{/videos/create}" method="post"enctype="multipart/form-data">

                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-semibold">Upload Video</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body pt-2">

                    <div class="mb-3">
                        <label class="form-label small text-muted">Video Title</label>
                        <input type="text"
                               name="title"
                               maxlength="200"
                               required
                               class="form-control rounded-pill px-3"
                               placeholder="My Video Title"
                               th:value="${videoTitleValue}">
                    </div>

                    <div class="mb-3">
    <label class="form-label small text-muted">Video File</label>
    <input type="file"
           name="file"
           accept="video/mp4,video/webm,video/ogg,.mp4,.webm,.ogg"
           required
           class="form-control rounded-4 px-3">
    <div class="form-text">Upload an MP4, WebM, or OGG file up to 50 MB.</div>
</div>

                    <div class="mb-2">
                        <label class="form-label small text-muted">Channel</label>
                        <select name="channelId"
                                required
                                class="form-select rounded-pill px-3">
                            <option value="">Choose a channel</option>
                            <option th:each="channel : ${channels}"
                                    th:value="${channel.id}"
                                    th:text="${channel.name}"
                                    th:selected="${videoChannelIdValue != null and videoChannelIdValue == channel.id}">
                            </option>
                        </select>
                    </div>

                </div>

                <div class="modal-footer border-0 pt-0">
                    <button type="button"
                            class="btn btn-outline-secondary rounded-pill px-4"
                            data-bs-dismiss="modal">
                        Cancel
                    </button>

                    <button type="submit"
                            class="btn btn-dark rounded-pill px-4">
                        Create Video
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>
    <!-- Bootstrap JavaScript bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Global Toast Helper -->
    <script>
        window.showToast = function(message, type, duration) {
            type = type || 'success';
            duration = duration || 4000;

            var container = document.getElementById('vsToastContainer');
            if (!container) return;

            var icons = {
                success: 'bi-check-circle-fill',
                error: 'bi-exclamation-triangle-fill',
                info: 'bi-info-circle-fill'
            };

            var toast = document.createElement('div');
            toast.className = 'vs-toast vs-toast-' + type;
            toast.innerHTML =
                '<i class="bi ' + (icons[type] || icons.info) + '"></i>' +
                '<span>' + message + '</span>' +
                '<button class="vs-toast-close" onclick="this.parentElement.remove()">&times;</button>';

            container.appendChild(toast);

            setTimeout(function() {
                toast.style.animation = 'vsToastOut 0.3s ease-in forwards';
                setTimeout(function() { toast.remove(); }, 300);
            }, duration);
        };
    </script>

    <!-- Display Server Flash Messages as Toast Notifications -->
    <script th:if="${successMessage}">
        document.addEventListener("DOMContentLoaded", function () {
            showToast(/*[[${successMessage}]]*/ '', 'success');
        });
    </script>
    <script th:if="${errorMessage}">
        document.addEventListener("DOMContentLoaded", function () {
            showToast(/*[[${errorMessage}]]*/ '', 'error');
        });
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const toggleBtn = document.getElementById("sidebarToggle");
            const toggleIcon = document.getElementById("sidebarToggleIcon");
            const sidebar = document.getElementById("sidebar");

            if (toggleBtn && toggleIcon && sidebar) {
                toggleBtn.addEventListener("click", function () {
                    sidebar.classList.toggle("collapsed");
                    const isCollapsed = sidebar.classList.contains("collapsed");
                    toggleIcon.textContent = isCollapsed ? "☰" : "✕";
                    toggleBtn.classList.toggle("active", !isCollapsed);
                });
            }
        });
    </script>
    <script th:if="${openUploadVideoModal}">
    document.addEventListener("DOMContentLoaded", function () {
        const modalElement = document.getElementById("uploadVideoModal");
        if (modalElement) {
            const modal = new bootstrap.Modal(modalElement);
            modal.show();
        }
    });
</script>
</body>
</html>
