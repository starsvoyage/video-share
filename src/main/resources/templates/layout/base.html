<!--
    base.html (View Layer - Thymeleaf Layout)

    Defines the main layout template for the application.
    Provides the common page structure including Bootstrap, shared CSS,
    and an optional navigation bar.

    Other pages insert their content into this layout using the
    'content' fragment parameter.
-->
<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(pageTitle, content, showNavbar)">

<head>
    <meta charset="UTF-8">
    <!-- Page title passed from child templates -->
    <title th:text="${pageTitle}">VideoShare</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <!-- Application styles -->
    <link rel="stylesheet" th:href="@{/css/register.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/sidebar.css}">
    <link rel="stylesheet" th:href="@{/css/navbar.css}">
    <link rel="stylesheet" th:href="@{/css/you.css}">
</head>

<body style="background-color: #f1f3f5;">
    <!-- Navbar -->
    <th:block th:if="${showNavbar}">
        <div th:replace="~{fragments/navbar :: navbar}"></div>
    </th:block>

    <!-- Page layout -->
    <div class="d-flex">

        <!-- Sidebar -->
        <th:block th:if="${showNavbar}">
            <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        </th:block>

        <!-- Page-specific content -->
        <main class="flex-grow-1">
            <th:block th:replace="${content}"></th:block>
        </main>

    </div>

    <!-- Bootstrap JavaScript bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const toggleBtn = document.getElementById("sidebarToggle");
            const toggleIcon = document.getElementById("sidebarToggleIcon");
            const sidebar = document.getElementById("sidebar");

            if (toggleBtn && toggleIcon && sidebar) {
                toggleBtn.addEventListener("click", function () {
                    sidebar.classList.toggle("collapsed");
                    const isCollapsed = sidebar.classList.contains("collapsed");
                    toggleIcon.textContent = isCollapsed ? "☰" : "✕";
                    toggleBtn.classList.toggle("active", !isCollapsed);
                });
            }
        });
    </script>
</body>
</html>
